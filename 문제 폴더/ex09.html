<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 9번</title>
</head>
<body>
    <form action="/login" method="post">
        <div>
            <label for="username">이름: </label>
            <input type="text" id="username" placeholder="이름을 입력 해주세요.">
        </div>
        <div>
            <label for="userEmail">이메일: </label>
            <input type="email" id="userEmail" placeholder="이메일을 입력 해주세요.">
        </div>
        <div>
            <label for="userPassword">비밀번호: </label>
            <input type="password" id="userPassword" placeholder="비밀번호를 입력 해주세요.">
        </div>
        <div>
            <label for="userBirth">생년월일: </label>
            <input type="datetime-local" id="userBirth">
        </div>
        <div>
            <label for="userGender">성별: </label>
            <label for="male">남성</label>
            <input type="radio" id="male" name="userGender">
            <label for="female">여성</label>
            <input type="radio" id="female" name="userGender">
        </div>
        <div>
            <label for="harbit">관심분야: </label>
            <label for="Java">Java</label>
            <input type="checkbox" id="Java" name="harbit">
            <label for="Python">Python</label>
            <input type="checkbox" id="Python" name="harbit">
            <label for="JavaScript">JavaScript</label>
            <input type="checkbox" id="JavaScript" name="harbit">
        </div>
        </form>
</body>
</html>
<!--[구성]
- 이름: type="text"
- 이메일: type="email"
- 비밀번호: type="password"
- 생년월일: type="date"
- 성별: type="radio" (남/여)
- 관심분야: type="checkbox" (Java/Python/JavaScript)
- 자기소개: textarea (rows="5", cols="40")
- 가입하기: type="submit"-->

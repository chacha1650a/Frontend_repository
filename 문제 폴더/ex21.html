<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 21번</title>
    <style>
        .profile {
            box-sizing: border-box;
            width: 350px;
            padding: 30px;
            margin: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="profile">
        <h2>김대훈</h2>
        <p>안녕하세요 저는 김대훈입니다.</p>
        <a href="https://github.com/chacha1650a" target="_blank">깃허브로 이동하기</a>
    </div>
</body>
</html>

<!--[요구사항]
- 카드 너비 350px, 패딩 30px, 가운데 정렬 (margin auto)
- 테두리 1px solid #ddd, border-radius 10px (모서리 둥글게)
- h2로 이름, p로 소개글, a로 GitHub 링크
- box-sizing: border-box 적용-->

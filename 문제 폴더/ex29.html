<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 29번</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* [스타일] 본문 max-width 800px, margin auto */
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            font-family: 'Pretendard', sans-serif;
            color: #333;
            padding: 20px;
        }

        section, div {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .header {
            background-color: #f8f9fa;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 8px;
        }

        ul {
            list-style-position: inside;
            font-weight: bold;
        }

        li {
            font-weight: normal;
            margin-left: 20px;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #f4f4f4;
        }

        .links a {
            display: inline-block;
            margin-right: 15px;
            color: #0066CC;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>
    <div>
        <header class="header">이름 : 김대훈 | 연락처 : 010-5879-7023</header>
    </div>
    <div>
        <h2>자기소개</h2>
        <p>안녕하십니까 OO에 지원한 김대훈이라고합니다.</p>
        <p>제가 본사에 지원을 하게 된 이유는.. (중략)</p>
        <p>(중략)회사의 발전에 도움이 되는 인재가 되고 싶습니다. </p>
    </div>
    <div>
        <ul>기술 스택
            <li>Java</li>
            <li>Spring</li>
            <li>MySQL</li>
            <li>HTML/CSS</li>
        </ul>
    </div>
    <div>
        <table>
            <tr>
                <th>회사명</th>
                <th>기간</th>
                <th>담당 업무</th>
            </tr>
            <tr>
                <td>(해당 없음)</td>
                <td>(해당 없음)</td>
                <td>(해당 없음)</td>
            </tr>
        </table>
    </div>
    <div class="links" style="border-bottom: none;">
        <a href="https://github.com/chacha1650a" target="_blank">GitHub로 이동하기</a>
        <a href="mailto:chacha1650a@example.com">이메일 보내기</a>
    </div>
</body>
</html>
<!-- [구성]
- 고정 헤더 (이름 + 연락처)
- 프로필 섹션: h2 "자기소개", p 태그로 3줄 소개
- 기술 스택: ul로 목록 (Java, Spring, MySQL, HTML/CSS)
- 경력 사항: table (회사명, 기간, 담당업무)
- 하단: a 태그로 GitHub, 이메일 링크

[스타일]
- 전체 box-sizing border-box, 전체 margin/padding 리셋
- 본문 max-width 800px, margin auto
- 섹션마다 border-bottom 1px solid #eee, 패딩 아래 20px, 마진 아래 20px -->

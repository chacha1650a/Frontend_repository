<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 15번</title>
    <style>
        .tag {
            display: inline-block;
            width: 100px;
            height: 40px;
            background-color: #eee;
            text-align: center;
            margin: 5px;
        }
    </style>
</head>
<body>
    <span class="tag">Java</span>
    <span class="tag">Python</span>
    <span class="tag">CSS</span>
</body>
</html>

<!--inline일때 width,와 height가 적용되지 않은 이유는 width와 height는 블록 레벨 요소는 div로 나누어진 구역을
통째로 사용하는 속성이나 inline은 인라인 레벨 요소로 해당 콘텐츠 영역에 또 다른 요소가 올 수 있어야 하기에 width와 height 속성이
적용이 되지 않는다.-->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 22번</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #333;
        }

        ul, li {
            display: inline-block;
        }

        ul, li, a {
            display: block;
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">메뉴 1</a></li>
        <li><a href="#">메뉴 2</a></li>
        <li><a href="#">메뉴 3</a></li>
    </ul>
</body>
</html>

<!--[요구사항]
- ul: list-style none, 패딩 0, 마진 0, 배경색 #333
- li: display inline-block
- a: display block, color white, 패딩 14px 20px, text-decoration none
- a에 마우스 올리면 배경색 #555 (a:hover)-->

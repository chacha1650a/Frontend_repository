<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 4번</title>
    <style>
        table {
            border-collapse: collapse;
        }

        table, td {
            border: 1px solid #222;
        }

        td {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>교시</th>
            <th>월요일</th>
            <th>화요일</th>
            <th>수요일</th>
        </tr>
        <tr>
            <td>1교시</td>
            <td>Java</td>
            <td>HTML</td>
            <td>MySQL</td>
        </tr>
        <tr>
            <td>2교시</td>
            <td>Java</td>
            <td>CSS</td>
            <td>MySQL</td>
        </tr>
        <tr>
            <td>3교시</td>
            <td>Spring</td>
            <td colspan="2">프로젝트</td>
            
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Student {

            // Java와 다르게 constructor라는 생성자명으로 생성자를 선언함.
            constructor() {
                console.log("생성자 호출");
            }

        }

        const s1 = new Student();
        const s2 = new Student();

        console.log(typeof s1);
        console.log(s1 === s2);

        const s3 = {};
        const s4 = {};

        console.log(typeof s3);
        console.log(s3 === s4);

        console.log(typeof []);
        // 배열도 객체로 보며 배열의 빈 값은 null이라고 본다

        s1.name = "김준일";
        console.log(s1.name);
        s1.name = "김준이";
        console.log(s1.name);
        s3.name = "김준일";
        console.log(s3.name);
        s2["name"] = "김준일";  // JavaScript에서의 객체는 "Key" : Value 형태이기에 Key 값에는 문자열로 작성을 해주어야 한다.
        console.log(s2.name);
        console.log(s2["name"]);

        const key = "name";
        console.log(s1[key]);
        const datas = {
            // JS에서는 쉼표를 자동으로 제거해주는 기능이 있기에 사용할 때 유용하다
            names: ["김준일", "김준이",],
            ages: [33, 34,],
            print: () => {
                // this 관련해서는 나중에 설명
                console.log(datas.names);
                console.log(datas.ages);
            }
        }

        console.log(datas["names"][0]);
        datas.print();

        const datas2 = datas;   // 얕은 복사(주소 값만 복사 해옴)
        console.log(datas === datas2);
        const datas3 = {...datas};
        console.log(datas === datas3);
    </script>
</body>
</html>

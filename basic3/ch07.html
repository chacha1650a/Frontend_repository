<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신규 회원가입</title>
    <style>
        html, body {
            margin: 0;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0 auto;
            width: 1200px;
            height: 600px;
            overflow:auto;
        }

        .card {
            display: flex;
            flex-direction:column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            padding: 20px;
            
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow: hidden;

            & > label {
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #444;
            }

            & > input {
                position: relative;
                z-index: 10;
                border: none;
                outline: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }

        .register-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #222;
            border-radius: 4px;
            background-color: #1e9be4;
            font-size: 16px;
            color: white;
            cursor: pointer;
            width: 355px;
            height: 40px;
        }

        .register-btn:hover {
            background-color: #1a8fd3;
        }

        .register-btn:active {
            background-color: #1780bd;
        }
    </style>
</head>
<body>
    <!--1. input 2개 (username, password)-->
    <!--2. button 1개 (등록하기)-->
    <div class="container">
        <div class="card">
            <div class="input-box">
                <input type="text" id="un">
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                
                <input type="password" id="pw">
                <label for="pw">비밀번호</label>
            </div>
            <div>
                <button type="button" class="register-btn">사용자 정보 등록</button>
            </div>
        </div>
    </div>
    <script>
        
    </script>
</body>
</html>

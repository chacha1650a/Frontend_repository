<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>이름</th>
            </tr>
        </thead>
        <tbody class="name-table-body">

        </tbody>
    </table>

    <script>
        // map(mapping) -> 일치하는 것을 1 : 1로 짝짓는다.
        // map은 갯수가 그대로 유지되어야 한다.
        // 치환하는 과정에서 자료형이 바뀔 수도 있다.
        // [ 10, 20, 30 ] -> [ 100, 200, 300 ]
        // [ "준일", "준이", "준삼"] -> ["김준일", "김준이", "김준삼" ]
        // [ {name: "준일"}, {name: "준이"}, {name: "준삼"} ]
        // [ "준일", "준이", "준삼" ]

        // map은 1:1 대응으로 값을 담고 filter는 조건부로 값을 담는다

        const arrayObject = {
            arr: [],
            map: (mapFx) => {
                console.log("1: " + mapFx);
                const newArray = [];
                console.log("2: " + arrayObject.arr);
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    console.log("3: " + mapFx(arrayObject.arr[i]));
                    newArray.push(mapFx(arrayObject.arr[i]));
                }
                console.log("4: " + newArray);
                return newArray;
            },
            filter: (predicate) => {
                const newArray = [];
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    if (predicate(arrayObject.arr[i])) {
                        newArray.push(arrayObject.arr[i]);
                    }
                }
                return newArray;
            }
        }

        const names = [ "준일", "준이", "준이삼 "];
        console.log(names);
        arrayObject.arr = names;
        console.log(arrayObject.map(name => "김" + name));
        console.log(arrayObject.filter(name => !name.includes("이")));



        const box1 = {
            miniBox: {
                content: "미니박스1",
            }
        }

        const box2 = {
            miniBox: {
                content: "미니박스2",
            }
        }

        const box3 = {
            miniBox: {
                content: "미니박스3",
            }
        }

        const boxList = [ box1, box2, box3 ];
        const miniBoxList = [ box1.miniBox, box2.miniBox, box3.miniBox ];
        const miniBoxList2 = [];
        for (let box of boxList) {
            miniBoxList2.push(box.miniBox)
        }
        const miniBoxList3 = boxList.map(box => box.miniBox);
        // const contents = boxList.map();

        const name = "김준일";
        const message = `${name}님 환영합니다`;
        console.log(message);

        const nameList = [ "김준일", "김준이", "김준삼" ];
        console.log(nameList.map(name => `<tr><td>${name}</td></tr>`));
        
        const tableBody = document.querySelector(".name-table-body");
        tableBody.innerHTML = nameList.map(name => `<tr><td>${name}</td></tr>`).join("");
    </script>
</body>
</html>

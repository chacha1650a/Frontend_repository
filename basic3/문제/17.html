<body>
    <script>
        function circleArea(r) {
            const π = Math.PI;
            return r * r * π;
        }

        const circleArea2 = function(r) {
            const π = Math.PI;

            return r * r * π;
        }

        const circleArea3 = r => r * r * Math.PI;


        console.log(circleArea(5));
        console.log(circleArea2(10));
        console.log(circleArea3(20));
    </script>
</body>

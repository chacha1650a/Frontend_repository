<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 20번</title>
</head>
<body>
    <script>
        function stats(...params) {
            let result = {
                sum: 0,
                avg: 0,
            };

            for (let i = 0; i < params.length; i++) {
                result.sum += params[i];
            }

            result.avg = result.sum / params.length;

            return result;
        }

       console.log(stats(10, 20, 30).sum);
       console.log(stats(10, 20, 30).avg);
    </script>
</body>
</html>

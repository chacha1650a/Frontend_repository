<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 9번</title>
</head>
<body>
    <script>
        let score = 85;

        if (score >= 90) {
            console.log('A');
        } else if (score >= 80) {
            console.log('B');
        } else if (score >= 70) {
            console.log('C');
        } else if (score >= 60) {
            console.log('D');
        } else if (score > 100) {
            console.log('유효하지 않은 값입니다.')
        } else if (score < 0) {
            console.log('음수는 유효하지 않은 값입니다.')
        } else {
            console.log('F');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제 21번</title>
</head>
<body>
    <script>
        function factorial(n) {
            let result = 1;
            if (n === 0) {
                return 1;
            }

            for (let i = 0; i < n; i++) {
                result *= n - i;
            }

            return result;
        }

        //재귀함수 (반복적으로 자기 자신을 계속 호출하여 반복 작업을 하는 함수패턴 -> 탈출 조건을 확실하게 만들어 줘야한다.)
        function factorial2(n) {
            if (n === 0 || n === 1) return 1;
            return n * factorial2(n - 1);

        }

        console.log(factorial2(0));
        console.log(factorial2(5));
        console.log(factorial2(7));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 100px auto;
            padding: 20px;
            box-sizing: border-box;
            border: 2px solid #999797;
            background-color: rgb(210, 232, 236);
            border-radius: 15px;
            text-align: center;
            width: 500px;
            height: 400px;

        }

        .text {
            bottom: 10px;
            font-weight: bold;
            font-size: 21px;
            border: 1px solid #222;
            border-radius: 15px;
            width: 120px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="card-box">
        <div class="text">
            <h3>Login</h3>
        </div>
        <div class="username">
            <input type="text" placeholder="Username">
        </div>
        <div class="password">
            <input type="password" placeholder="Password">
        </div>
    </div>
</body>
</html>
